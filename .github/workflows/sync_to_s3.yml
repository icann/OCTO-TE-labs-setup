name: Sync to S3
on:
  push:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set S3 Bucket Name
      run: |
        if [ "${{ github.ref_name }}" != "main" ]; then
          echo "AWS_S3_BUCKET=${{ vars.DESTINATION_BUCKET }}-${{ github.ref_name }}" >> $GITHUB_ENV
        else
          echo "AWS_S3_BUCKET=${{ vars.DESTINATION_BUCKET }}" >> $GITHUB_ENV
        fi    
    - name: inject values
      run: |
        sed -i -e's/%S3BUCKET%/${{ env.AWS_S3_BUCKET }}/g' lab-ec2.yaml
        sed -i -e's/%DNS_PARENT_DEFAULT%/${{ vars.DNS_PARENT_DEFAULT }}/g' lab-ec2.yaml

        ESCAPED_SSH_PUBLIC_KEY=$(printf '%s\n' "${{ vars.SSH_PUBLIC_KEY }}" | sed -e 's/[\/&]/\\&/g')
        sed -i -e "s/%SSH_PUBLIC_KEY%/${ESCAPED_SSH_PUBLIC_KEY}/g" lab-ec2.yaml

        ESCAPED_KSK_ARN=$(printf '%s\n' "${{ vars.KSK_ARN }}" | sed -e 's/[\/&]/\\&/g')
        sed -i -e"s/%KSK_ARN%/${ESCAPED_KSK_ARN}/g" lab-ec2.yaml

        ESCAPED_VPNPEERNAME=$(printf '%s\n' "${{ vars.VPNPEERNAME }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNLISTENPORT=$(printf '%s\n' "${{ vars.VPNLISTENPORT }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNPRIVATEKEY=$(printf '%s\n' "${{ vars.VPNPRIVATEKEY }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNLOCALIPV4=$(printf '%s\n' "${{ vars.VPNLOCALIPV4 }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNPUBLICKEY=$(printf '%s\n' "${{ vars.VPNPUBLICKEY }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNALLOWEDPREFIXIPV4=$(printf '%s\n' "${{ vars.VPNALLOWEDPREFIXIPV4 }}" | sed -e 's/[\/&]/\\&/g')
        ESCAPED_VPNENDPOINTIPV4=$(printf '%s\n' "${{ vars.VPNENDPOINTIPV4 }}" | sed -e 's/[\/&]/\\&/g')
        sed -i  -e"s/%VPNpeerName%/${ESCAPED_VPNPEERNAME}/g" \
                -e"s/%VPNlistenPort%/${ESCAPED_VPNLISTENPORT}/g" \
                -e"s/%VPNprivateKey%/${ESCAPED_VPNPRIVATEKEY}/g" \
                -e"s/%VPNlocalIPv4%/${ESCAPED_VPNLOCALIPV4}/g" \
                -e"s/%VPNpublicKey%/${ESCAPED_VPNPUBLICKEY}/g" \
                -e"s/%VPNallowedPrefixIPv4/${ESCAPED_VPNALLOWEDPREFIXIPV4}/g" \
                -e"s/%VPNendPointIPv4%/${ESCAPED_VPNENDPOINTIPV4}/g" \
                ../configs/deploy-parameters.yaml
    - name: Sync to S3
      uses: jakejarvis/s3-sync-action@master
      with:
        args: --follow-symlinks --delete --exclude '.gitignore' --exclude '.github/*' --exclude '.git/*' 
      env:
        AWS_S3_BUCKET: ${{ env.AWS_S3_BUCKET }}
        AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
        AWS_REGION: 'us-east-2'
